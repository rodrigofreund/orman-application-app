<om-toolbar (toggleMenu)="sidenav.toggle()"></om-toolbar>

<mat-sidenav-container>
  <mat-sidenav #sidenav>
    <div>
      <a [routerLink]="['/users/new']" (click)="sidenav.toggle()">New user</a>
    </div>
    <div>
      <a [routerLink]="['/users/list']" (click)="sidenav.toggle()">List
        users</a>
    </div>

  </mat-sidenav>
  <mat-sidenav-content>
    <div class="container text-center">
      <div class="row">
        <div
          class="col-xs-12 col-sm-10 col-md-8 col-sm-offset-1 col-md-offset-2">
          <router-outlet />
        </div>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
