<h1>Create a new User</h1>

<form [formGroup]="form" (ngSubmit)="onSubmit()">

  <div class="row">
    <div class="col-lg-10 col-lg-offset-2">
      <mat-form-field class="space-around">
        <mat-label>Name</mat-label>
        <input matInput type="text" formControlName="name">
      </mat-form-field>

      <mat-form-field class="space-around">
        <mat-label>Surname</mat-label>
        <input matInput type="text" formControlName="surname">
      </mat-form-field>

      <mat-form-field class="space-around">
        <mat-label>Document</mat-label>
        <input matInput type="text" formControlName="document">
      </mat-form-field>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-8 col-lg-offset-4">
      <mat-form-field class="space-around">
        <mat-label>Email</mat-label>
        <input matInput type="text" formControlName="email">
      </mat-form-field>
      <mat-form-field class="space-around">
        <mat-label>Phone</mat-label>
        <input matInput type="text" formControlName="phone">
      </mat-form-field>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-8 col-lg-offset-4">
      <mat-form-field class="space-around">
        <mat-label>Street</mat-label>
        <input matInput type="text" formControlName="street">
      </mat-form-field>

      <mat-form-field class="space-around">
        <mat-label>Number</mat-label>
        <input matInput type="text" formControlName="number">
      </mat-form-field>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-10 col-lg-offset-2">
      <mat-form-field class="space-around">
        <mat-label>Complement</mat-label>
        <input matInput type="text" formControlName="complement">
      </mat-form-field>

      <mat-form-field class="space-around">
        <mat-label>Complement2</mat-label>
        <input matInput type="text" formControlName="complement2">
      </mat-form-field>
      <mat-form-field class="space-around">
        <mat-label>Complement3</mat-label>
        <input matInput type="text" formControlName="complement3">
      </mat-form-field>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-10 col-lg-offset-2">
      <mat-form-field class="space-around">
        <mat-label>Region</mat-label>
        <input matInput type="text" formControlName="region">
      </mat-form-field>

      <mat-form-field class="space-around">
        <mat-label>PostalCode</mat-label>
        <input matInput type="text" formControlName="postalCode">
      </mat-form-field>
      <mat-form-field class="space-around">
        <mat-label>State</mat-label>
        <input matInput type="text" formControlName="state">
      </mat-form-field>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-10 col-lg-offset-2">
      <mat-form-field class="space-around">
        <mat-label>City</mat-label>
        <input matInput type="text" formControlName="city">
      </mat-form-field>

      <mat-form-field class="space-around">
        <mat-label>Country</mat-label>
        <input matInput type="text" formControlName="country">
      </mat-form-field>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-10 col-lg-offset-2">
      <mat-form-field class="space-around">
        <mat-label>Password</mat-label>
        <input matInput type="text" formControlName="password">
      </mat-form-field>

      <mat-checkbox formControlName="blocked">Blocked</mat-checkbox>
      <mat-checkbox formControlName="active">Active</mat-checkbox>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-12">
      <button mat-raised-button type="submit" color="primary">Send</button>
    </div>
  </div>

</form>
